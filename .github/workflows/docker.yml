name: Docker

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/docker.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "docker-compose*.yml"
      - "pyproject.toml"
      - "README.md"
      - "src/**"
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
    paths:
      - ".github/workflows/docker.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "docker-compose*.yml"
      - "pyproject.toml"
      - "README.md"
      - "src/**"

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Read package version
        id: package-version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          print(f"version={version}")
          PY

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python - <<'PY'
          import os

          version = os.environ["PACKAGE_VERSION"]
          tag = os.environ["GITHUB_REF_NAME"]
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(f"Release tag {tag!r} does not match pyproject version {expected!r}.")
          PY
        env:
          PACKAGE_VERSION: ${{ steps.package-version.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.package-version.outputs.version }}
            ${{ steps.image.outputs.name }}:latest
          labels: |
            org.opencontainers.image.title=EPUB Optimizer
            org.opencontainers.image.description=Local web app for normalizing EPUB files into a consistent house style.
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.package-version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=GPL-3.0
          cache-from: type=gha
          cache-to: type=gha,mode=max
