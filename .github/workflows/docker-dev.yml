name: Docker Dev

on:
  workflow_dispatch:
  push:
    branches: ["dev"]
    paths:
      - ".github/workflows/docker-dev.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "docker-compose*.yml"
      - "pyproject.toml"
      - "README.md"
      - "src/**"

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build dev image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.name }}:dev
          labels: |
            org.opencontainers.image.title=EPUB Optimizer
            org.opencontainers.image.description=Local web app for normalizing EPUB files into a consistent house style.
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=dev
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=GPL-3.0
          cache-from: type=gha
          cache-to: type=gha,mode=max
