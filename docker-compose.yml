services:
  epub-optimizer:
    container_name: epub-optimizer
    image: ghcr.io/henrybaby/epub-optimizer:latest
    restart: unless-stopped
    ports:
      - "4200:4200"
    environment:
      EPUB_OPTIMIZER_MAX_UPLOAD_MB: "100"
    volumes:
      - epub_optimizer_data:/data

volumes:
  epub_optimizer_data:
