services:
  epub-optimizer:
    container_name: epub-optimizer
    image: ghcr.io/henrybaby/epub-optimizer:latest
    restart: unless-stopped
    ports:
      - "4200:4200"
    environment:
      EPUB_OPTIMIZER_MAX_UPLOAD_MB: "100"
    volumes:
      - epubo_data:/data
      - /path/to/watch:/watch
      - /path/to/bookdrop:/output
      # Optional: expose failed automation inputs and error reports on the host.
      # - /path/to/failed:/data/failed

volumes:
  epubo_data:
    name: epubo_data
