<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EPUB Optimizer</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div class="title-row">
          <h1>EPUB Optimizer</h1>
          <span class="version">v{{ app_version }}</span>
        </div>
        <form id="optimizer-form" action="/optimize" method="post" enctype="multipart/form-data">
          <label for="files">EPUB files</label>
          <input
            id="files"
            name="files"
            type="file"
            accept=".epub,application/epub+zip"
            multiple
            required
          >
          <p class="hint">Maximum upload size: {{ max_upload_mb }} MB</p>
          <button id="optimize-button" type="submit">Optimize EPUB</button>
        </form>
      </section>

      <section class="panel progress" aria-live="polite">
        <div class="result-header">
          <div>
            <h2 id="status-title">Ready</h2>
            <p id="status-detail">Select one or more EPUB files.</p>
          </div>
        </div>

        <h3>Processing log</h3>
        <ol id="processing-log" class="log-window"></ol>
      </section>

      <section id="results-panel" class="panel result" hidden>
        <h2>Optimized EPUBs</h2>
        <div id="results-list" class="results-list"></div>
      </section>
    </main>
    <script src="{{ url_for('static', path='/app.js') }}"></script>
  </body>
</html>
